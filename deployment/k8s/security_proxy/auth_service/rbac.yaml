apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-account
  namespace: cybertwin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configmap-reader
  namespace: cybertwin
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]  # 仅允许读取ConfigMap

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auth-service-configmap-binding
  namespace: cybertwin
subjects:
- kind: ServiceAccount
  name: auth-service-account
  namespace: cybertwin
roleRef:
  kind: Role
  name: configmap-reader
  apiGroup: rbac.authorization.k8s.io
