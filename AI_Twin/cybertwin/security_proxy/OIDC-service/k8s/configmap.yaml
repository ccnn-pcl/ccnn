apiVersion: v1
kind: ConfigMap
metadata:
  name: oidc-env
  namespace: CCNN
data:
  # ========== OIDC 提供者 ==========
  # 只需配 issuer 和端口，其余端点由 config.py 自动拼接
  OIDC_ISSUER: http://<OP_SERVICE_HOST>:31111

  # ========== OIDC 客户端注册 ==========
  CLIENTS: >-
    {"user_agent":{"secret":"<USER_AGENT_SECRET>","redirect_uris":["http://<USER_AGENT_HOST>:30050/callback"],"post_logout_redirect_uris":["http://<USER_AGENT_HOST>:30050"]},"app2":{"secret":"<APP2_SECRET>","redirect_uris":["http://localhost:5002/callback"],"post_logout_redirect_uris":["http://localhost:5002"]}}

  # ========== 数据库 ==========
  DATABASE_URI: sqlite:///data/cybertwin.db
  MYSQL_DB1_URL: mysql+pymysql://<MYSQL_USER>:<MYSQL_PASSWORD>@<MYSQL_HOST1>:3306/cybertwin?charset=utf8mb4
  MYSQL_DB2_URL: mysql+pymysql://<MYSQL_USER>:<MYSQL_PASSWORD>@<MYSQL_HOST2>:3306/cybertwin?charset=utf8mb4

  # ========== 内部服务 ==========
  TRUST_SERVICE_URL: http://auth-service.cybertwin.svc.cluster.local/evaluate/user-trust

  # ========== 前端 ==========
  LOGIN_PAGE_URL: https://<CCNN-frontend_HOST>/ctlogin
  CORS_ORIGINS: https://<CCNN-frontend_HOST>

  # ========== 接入端 ==========
  OPENXG_ADDR: http://<OPENXG_HOST>:30102/cert_link/v1/auth

  # ========== Session Cookie ==========
  SESSION_COOKIE_DOMAIN: .<YOUR_DOMAIN>
  SESSION_COOKIE_HTTPONLY: "True"
  SESSION_COOKIE_PATH: /
  SESSION_COOKIE_SAMESITE: Lax
  SESSION_COOKIE_SECURE: "True"

  # ========== Kafka ==========
  KAFKA_BROKER: 192.168.193.82:31493
  KAFKA_TOPIC: _cybertwin_event_
  KAFKA_GROUP_ID: cybertwin_event_sr_group
  KAFKA_USERNAME: admin
  KAFKA_PASSWORD: pcnl@2026
