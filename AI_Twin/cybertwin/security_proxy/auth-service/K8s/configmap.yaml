# 修正：城市→网络风险值映射（单Key+JSON格式，支持中文城市名）
apiVersion: v1
kind: ConfigMap
metadata:
  name: city-network-risk-config
data:
  # Key 用英文（符合K8s规范），Value 是 JSON 字符串（包含中文城市名映射）
  city_risk_map: >-
    {
      "长沙": "0.5",
      "北京": "0.8",
      "上海": "0.8",
      "广州": "0.7",
      "深圳": "1",
      "杭州": "0.6",
      "成都": "0.5",
      "武汉": "0.6"
    }

---
