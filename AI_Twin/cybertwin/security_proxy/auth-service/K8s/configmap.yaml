apiVersion: v1
kind: ConfigMap
metadata:
  name: decay-rate-config
  namespace: cybertwin  # 与代码中NAMESPACE保持一致
data:
  # 密码衰减率（对应decayrate1），示例值20（可根据需求调整）
  decayrate1: "10"
  # 生物特征衰减率（对应decayrate2），示例值10（比密码衰减慢，符合需求）
  decayrate2: "20"
