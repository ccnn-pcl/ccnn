apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1  # 可根据负载调整副本数
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      nodeSelector:
        app: abacmodel
      serviceAccountName: auth-service-account  # 绑定RBAC授权
      containers:
      - name: auth-service
        # 替换为你的镜像仓库地址（如Docker Hub、Harbor）
        image: cybertwin-security:v4.0
        # 生产环境推荐Always，确保拉取最新镜像
        ports:
        - containerPort: 8000  # 与Dockerfile暴露的端口一致
        # 资源限制（根据实际需求调整）
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        # 健康检查探针（K8s自动重启异常服务）
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30  # 启动30秒后开始检查
          periodSeconds: 10        # 每10秒检查一次
          timeoutSeconds: 5        # 超时5秒视为失败
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5   # 启动5秒后检查是否就绪
          periodSeconds: 5         # 每5秒检查一次
